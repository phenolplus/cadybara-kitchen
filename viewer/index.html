<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cadybara 3D Viewer</title>
    <link rel="stylesheet" href="./styles.css?v=idle1" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <header class="hud">
      <div>
        <strong id="part-name">Loading</strong>
        <span id="part-meta"></span>
      </div>
      <label class="file-button">
        Load JSON
        <input id="file-input" type="file" accept="application/json,.json" />
      </label>
    </header>
    <footer class="status" id="status">Loading artifact</footer>
    <script type="module" src="./app.js?v=idle1"></script>
  </body>
</html>
